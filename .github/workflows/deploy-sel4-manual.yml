# Build and push seL4-manual docker image on changes or dependency updates

name: Deploy seL4 Manual container

on:
  push:
    branches:
    - master
    paths:
    - 'scripts/**'
    - 'sel4-manual/**'
  workflow_dispatch:
  # allow explict trigger from other repos when dependencies have changed
  repository_dispatch:
    types: [deps-update]

jobs:
  docker:
    name: Docker (seL4 Manual)
    if: ${{ github.repository_owner == 'seL4' }}
    runs-on: ubuntu-latest
    steps:
    - uses: docker/setup-buildx-action@v4
    - uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - uses: docker/build-push-action@v7
      with:
        push: true
        file: sel4-manual/Dockerfile
        tags: sel4/sel4manual:latest
