name: 'Deploy sel4test and other manifests after test'
description: |
  Constructs default.xml manifests after successful test and deploys it to
  the corresponding manifest repo.
author: Gerwin Klein <gerwin.klein@proofcraft.systems>

inputs:
  xml:
    description: manifest to deploy in xml
    required: true
  manifest:
    description: |
      the manifest xml file name to checkout from, if xml not specified.
      NOT used for the deploy, which uses default.xml always
    default: master.xml
    required: false
  manifest_repo:
    description: the manifest repository to deploy to
    required: false
  manifest_branch:
    description: Manifest repo branch
    default: master
    required: false
  action_name:
    description: 'internal -- do not use'
    required: false
    default: 'manifest-deploy'

runs:
  using: 'node24'
  main: '../js/index.js'
