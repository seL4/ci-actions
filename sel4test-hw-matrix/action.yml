name: 'seL4Test/Hardware Run Matrix'
description: Generates matrix for hardware runs.
author: Gerwin Klein <gerwin.klein@proofcraft.systems>

inputs:
  action_name:
    description: 'internal -- do not use'
    required: false
    default: 'sel4test-hw-matrix'

outputs:
  matrix:
    description: 'Hardware run matrix (JSON)'
  max_parallel:
    description: 'Number of base matrix entries, for use as strategy.max-parallel'

runs:
  using: 'node24'
  main: '../js/index.js'
